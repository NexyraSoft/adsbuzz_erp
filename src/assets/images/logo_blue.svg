    <path d="M 115,15 L 123,15 L 123,85 L 115,85 L 115,77 C 110,82 103,85 95,85 C 81,85 70,74 70,60 C 70,46 81,35 95,35 C 103,35 110,38 115,43 L 115,15 Z M 96,75 C 104,75 111,69 111,60 C 111,51 104,45 96,45 C 88,45 81,51 81,60 C 81,69 88,75 96,75 Z" fill="#125e98" />
    
    <!-- Letter 's' (Blue) -->
