<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 100" width="100%" height="100%">
  <defs>
    <!-- Smooth gradient for orange elements to add a premium touch -->
    <linearGradient id="orangeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E27413" />
      <stop offset="100%" stop-color="#F68B2D" />
    </linearGradient>
  </defs>

  <g id="logo-mark">
    <!-- Stylized 'A' - Top Triangle (Blue) -->
    <path d="M 45,18 L 65,42 L 28,54 Z" fill="#125e98" />
    
    <!-- Stylized 'A' - Bottom Wedge (Blue) -->
    <path d="M 18,85 L 38,85 L 28,66 Z" fill="#125e98" />
    
    <!-- Dynamic Orange Swoop/Arch -->
    <path d="M 15,82 C 60,35 110,18 180,36 C 120,28 70,45 35,82 Z" fill="url(#orangeGrad)" />
  </g>

  <g id="logo-text">
