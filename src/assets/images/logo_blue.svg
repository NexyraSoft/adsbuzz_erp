    <!-- Letter 'b' (Orange) -->
    <path d="M 172,15 L 180,15 L 180,52 C 185,47 191,44 198,44 C 209,44 218,53 218,65 C 218,76 209,85 198,85 C 191,85 185,82 180,77 L 180,85 L 172,85 Z M 197,75 C 205,75 210,69 210,60 C 210,51 205,45 197,45 C 189,45 183,51 183,60 C 183,69 189,75 197,75 Z" fill="url(#orangeGrad)" />
    
    <!-- Letter 'u' (Orange) -->
    <path d="M 226,45 L 234,45 L 234,72 C 234,75 236,78 242,78 C 248,78 250,75 250,72 L 250,45 L 258,45 L 258,72 C 258,80 251,85 242,85 C 233,85 226,80 226,72 Z" fill="url(#orangeGrad)" />
    
    <!-- Letter 'z' (Orange) -->
    <path d="M 266,45 L 296,45 L 296,53 L 277,77 L 296,77 L 296,85 L 266,85 L 266,77 L 285,53 L 266,53 Z" fill="url(#orangeGrad)" />
    
    <!-- Letter 'z' (Orange) -->
    <path d="M 302,45 L 332,45 L 332,53 L 313,77 L 332,77 L 332,85 L 302,85 L 302,77 L 321,53 L 302,53 Z" fill="url(#orangeGrad)" />
    
    <!-- "ERP" Text - bold sans-serif font matching existing style -->
    <text x="350" y="85" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="44" fill="#125e98" letter-spacing="1">ERP</text>
  </g>
